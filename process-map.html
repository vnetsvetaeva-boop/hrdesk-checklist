<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bai Jamjuree',sans-serif;background:#fff;color:#000;padding:20px 28px;line-height:1.5;max-width:100%;margin:0 auto}

.header{background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%);border-radius:10px;padding:16px 20px 14px;margin-bottom:16px}
.header-eyebrow{font-size:.7rem;font-weight:600;color:rgba(0,60,80,.5);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px}
.header-title{font-size:22px;font-weight:700;color:#0A3D4F;line-height:1.2}
.header-sub{font-size:14px;color:rgba(0,60,80,.6);margin-top:4px}

.steps{display:flex;gap:0;margin-bottom:16px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;padding:8px 2px 10px;border-radius:8px;transition:background .15s}
.step:hover{background:rgba(0,0,0,.02)}
.step.active:hover{background:rgba(128,234,255,.08)}

.step:not(:last-child)::after{content:'';position:absolute;top:24px;left:calc(50% + 18px);width:calc(100% - 36px);height:2px;background:#ecedea;z-index:0}
.step.active:not(:last-child)::after{background:#80EAFF}

.step-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;position:relative;z-index:1;transition:all .2s}
.step-circle.off{background:#f4f4f3;color:#aaa;border:2px solid #ecedea}
.step-circle.on{background:#80EAFF;color:#0A3D4F;border:2px solid #50D0ED}
.step-circle.sel{box-shadow:0 0 0 4px rgba(128,234,255,.35);transform:scale(1.12)}

.step-label{font-size:12px;font-weight:600;color:#999;text-align:center;margin-top:6px;line-height:1.25}
.step.active .step-label{color:#000;font-weight:700}

.step-role{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px;padding:2px 7px;border-radius:3px}
.role-you{background:#E0F7FF;color:#0E7490}
.role-hr{background:#f4f4f3;color:#999}
.role-both{background:#ECFDF5;color:#065F46}

.detail{background:#f4f4f3;border-left:3px solid #80EAFF;padding:14px 18px;border-radius:0 8px 8px 0;margin-bottom:12px}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.detail-num{width:26px;height:26px;border-radius:50%;background:#80EAFF;color:#0A3D4F;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-title{font-size:18px;font-weight:700;color:#000}
.detail-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:3px 8px;border-radius:4px;margin-left:auto}
.detail-text{font-size:18px;font-weight:500;color:#333;line-height:1.55}

.coverage{background:#f4f4f3;border:1px solid #ecedea;border-radius:8px;padding:10px 16px;font-size:14px;color:#555;line-height:1.5;text-align:center}
.coverage strong{color:#000}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Your journey</div>
  <div class="header-title">From Finalist to First Day</div>
  <div class="header-sub">Click any step to see what happens and who's responsible</div>
</div>

<div class="steps" id="steps"></div>
<div id="detail"></div>
<div class="coverage"><strong>This course covers Steps 2–6</strong> — from submitting your HRDESK request to closing the role in Lever.</div>

<script>
var STEPS=[
  {num:1,short:"Select Finalist",role:"you",roleLabel:"You",active:false,
   title:"Select Your Finalist",
   text:"You\u2019ve completed interviews and evaluations. The decision is made \u2014 you know who you want to hire. This step is already done by the time you reach this course."},
  {num:2,short:"Submit HRDESK Request",role:"you",roleLabel:"You",active:true,
   title:"Submit Your HRDESK Ticket",
   text:"Fill out the HRDESK Agreement Request form in Jira with all required details: candidate\u2019s legal name, salary, job title, start date, employment type, and ZIP ticket number. This is your primary action step."},
  {num:3,short:"HR Reviews & Drafts",role:"hr",roleLabel:"HR",active:true,
   title:"HR Reviews & Drafts the Agreement",
   text:"HR Compliance reviews your submission, drafts the agreement using the correct regional template, and runs background checks in parallel. You may be contacted for clarifications \u2014 stay responsive."},
  {num:4,short:"Approvals & Compliance",role:"both",roleLabel:"HR + Legal",active:true,
   title:"Approvals & Compliance Review",
   text:"If non-standard contract terms are needed, Legal reviews the draft. Total Rewards and People Operations confirm compensation alignment. You stay available for questions but don\u2019t need to take action."},
  {num:5,short:"Candidate Signs",role:"hr",roleLabel:"HR + DCT",active:true,
   title:"Candidate Signs the Agreement",
   text:"The Document Control Team sends the finalized agreement to the candidate for signing. If the candidate is unresponsive after 2 days, HR will ask you to follow up directly."},
  {num:6,short:"Close Role & Archive",role:"you",roleLabel:"You",active:true,
   title:"Close the Role & Archive Candidates",
   text:"Archive all remaining candidates in Lever with accurate reasons, close the posting and requisition, verify dashboards, and send disposition communications. SLA: 5 days to archive, 10 days to close."},
  {num:7,short:"Onboarding Begins",role:"both",roleLabel:"You + HR",active:false,
   title:"Onboarding Begins",
   text:"HR uploads the signed contract to HiBob, IT sets up equipment (14 business days), and you coordinate first-day logistics with the onboarding team. Your new hire is on the way!"}
];

var sel=1;

function render(){
  var stepsEl=document.getElementById('steps');
  var detailEl=document.getElementById('detail');

  stepsEl.innerHTML=STEPS.map(function(s,i){
    var circCls=s.active?'step-circle on':'step-circle off';
    if(i===sel)circCls+=' sel';
    var stepCls='step'+(s.active?' active':'');
    var roleCls=s.role==='you'?'role-you':s.role==='hr'?'role-hr':'role-both';
    return '<div class="'+stepCls+'" data-idx="'+i+'">'+
      '<div class="'+circCls+'">'+s.num+'</div>'+
      '<div class="step-label">'+s.short+'</div>'+
      '<div class="step-role '+roleCls+'">'+s.roleLabel+'</div>'+
    '</div>';
  }).join('');

  var s=STEPS[sel];
  var badgeCls=s.role==='you'?'role-you':s.role==='hr'?'role-hr':'role-both';
  detailEl.innerHTML=
    '<div class="detail">'+
      '<div class="detail-header">'+
        '<div class="detail-num">'+s.num+'</div>'+
        '<div class="detail-title">'+s.title+'</div>'+
        '<div class="detail-badge '+badgeCls+'">'+s.roleLabel+'</div>'+
      '</div>'+
      '<div class="detail-text">'+s.text+'</div>'+
    '</div>';

  stepsEl.querySelectorAll('.step').forEach(function(el){
    el.addEventListener('click',function(){
      sel=parseInt(el.dataset.idx);
      render();
    });
  });
}

render();
</script>
</body>
</html>
