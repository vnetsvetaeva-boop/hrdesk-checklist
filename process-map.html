<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Journey: From Finalist to First Day</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: #F9FAFB;
      color: #1F2937;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 4px 6px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #80EAFF 0%, #50D0ED 100%);
      border-radius: 10px;
      padding: 14px 18px 12px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .header-eyebrow {
      font-size: 10px; font-weight: 600;
      color: rgba(0,60,80,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .header-title {
      font-size: 17px; font-weight: 700;
      color: #0A3D4F; line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      color: rgba(0,60,80,0.6);
      margin-top: 4px;
      line-height: 1.3;
    }

    .steps {
      display: flex;
      gap: 0;
      position: relative;
      padding: 0 2px;
      flex-shrink: 0;
    }

    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      cursor: pointer;
      padding: 6px 2px 8px;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .step:hover { background: rgba(0,0,0,0.02); }
    .step.active:hover { background: rgba(128,234,255,0.08); }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 24px;
      left: calc(50% + 16px);
      width: calc(100% - 32px);
      height: 2px;
      background: #E5E7EB;
      z-index: 0;
    }
    .step.active:not(:last-child)::after,
    .step.done:not(:last-child)::after {
      background: #80EAFF;
    }

    .step-circle {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      position: relative;
      z-index: 1;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .step-circle.before {
      background: #F3F4F6;
      color: #9CA3AF;
      border: 2px solid #E5E7EB;
    }
    .step-circle.current {
      background: #80EAFF;
      color: #0A3D4F;
      border: 2px solid #50D0ED;
      box-shadow: 0 0 0 3px rgba(128,234,255,0.25);
    }

    .step-label {
      font-size: 11px; font-weight: 600;
      color: #6B7280;
      text-align: center;
      margin-top: 6px;
      line-height: 1.25;
      min-height: 28px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .step.active .step-label { color: #0A3D4F; font-weight: 700; }

    .step-role {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 3px;
      padding: 2px 6px;
      border-radius: 3px;
      line-height: 1.3;
    }
    .role-you { background: #E0F7FF; color: #0E7490; }
    .role-hr { background: #F3F4F6; color: #6B7280; }
    .role-both { background: #ECFDF5; color: #065F46; }

    .detail {
      margin-top: 10px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 16px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .detail-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #80EAFF;
      color: #0A3D4F;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .detail-title {
      font-size: 16px; font-weight: 700;
      color: #1F2937;
    }
    .detail-badge {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: auto;
    }
    .detail-text {
      font-size: 14px;
      color: #4B5563;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .detail-spacer { flex: 1; }
    .detail-hint {
      font-size: 11px;
      color: #9CA3AF;
      border-top: 1px solid #F3F4F6;
      padding-top: 10px;
      line-height: 1.4;
    }
    .detail-hint strong { color: #0A3D4F; }

    .coverage {
      margin-top: 8px;
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .coverage-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #80EAFF;
      flex-shrink: 0;
    }
    .coverage-text {
      font-size: 12px;
      color: #6B7280;
      line-height: 1.3;
    }
    .coverage-text strong { color: #0A3D4F; }

    @media (max-width: 580px) {
      .step-label { font-size: 9px; }
      .step-role { font-size: 8px; }
      .step-circle { width: 28px; height: 28px; font-size: 11px; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
var STEPS = [
  {
    num: 1, short: "Select Finalist", role: "you", roleLabel: "You", active: false,
    title: "Select Your Finalist",
    text: "You\u2019ve completed interviews and evaluations. The decision is made \u2014 you know who you want to hire. This step is already done by the time you reach this course.",
    hint: ""
  },
  {
    num: 2, short: "Submit HRDESK Request", role: "you", roleLabel: "You", active: true,
    title: "Submit Your HRDESK Ticket",
    text: "Fill out the HRDESK Agreement Request form in Jira with all required details: candidate\u2019s legal name, salary, job title, start date, employment type, and ZIP ticket number. This is your primary action step \u2014 the quality of your ticket directly determines how fast everything moves.",
    hint: ""
  },
  {
    num: 3, short: "HR Reviews & Drafts", role: "hr", roleLabel: "HR", active: true,
    title: "HR Reviews & Drafts the Agreement",
    text: "HR Compliance reviews your submission, drafts the agreement using the correct regional template, and runs background checks in parallel. You may be contacted for clarifications \u2014 stay responsive.",
    hint: ""
  },
  {
    num: 4, short: "Approvals & Compliance", role: "both", roleLabel: "HR + Legal", active: true,
    title: "Approvals & Compliance Review",
    text: "If non-standard contract terms are needed, Legal reviews the draft. Total Rewards and People Operations confirm compensation alignment. You stay available for questions but don\u2019t need to take action.",
    hint: ""
  },
  {
    num: 5, short: "Candidate Signs", role: "hr", roleLabel: "HR + DCT", active: true,
    title: "Candidate Signs the Agreement",
    text: "The Document Control Team sends the finalized agreement to the candidate for signing. If the candidate is unresponsive after 2 days, HR will ask you to follow up directly.",
    hint: ""
  },
  {
    num: 6, short: "Close Role & Archive", role: "you", roleLabel: "You", active: true,
    title: "Close the Role & Archive Candidates",
    text: "Archive all remaining candidates in Lever with accurate reasons, close the posting and requisition, verify dashboards, and send disposition communications. SLA: 5 days to archive, 10 days to close the role.",
    hint: ""
  },
  {
    num: 7, short: "Onboarding Begins", role: "both", roleLabel: "You + HR", active: false,
    title: "Onboarding Begins",
    text: "HR uploads the signed contract to HiBob, IT sets up equipment (14 business days), and you coordinate first-day logistics with the onboarding team. Your new hire is on the way!",
    hint: ""
  }
];

var state = { selected: 1 };

function render() {
  var sel = state.selected;
  var step = STEPS[sel];

  var stepsHtml = STEPS.map(function(s, i) {
    var isActive = s.active;
    var isSel = i === sel;
    var circleClass = isActive ? 'step-circle current' : 'step-circle before';
    var stepClass = 'step' + (isActive ? ' active' : '');

    var roleClass = s.role === 'you' ? 'role-you' : s.role === 'hr' ? 'role-hr' : 'role-both';

    return '<div class="' + stepClass + '" data-idx="' + i + '">' +
      '<div class="' + circleClass + '" style="' + (isSel ? 'transform:scale(1.15);box-shadow:0 0 0 4px rgba(128,234,255,0.35);' : '') + '">' + s.num + '</div>' +
      '<div class="step-label">' + s.short + '</div>' +
      '<div class="step-role ' + roleClass + '">' + s.roleLabel + '</div>' +
    '</div>';
  }).join('');

  var badgeClass = step.role === 'you' ? 'role-you' : step.role === 'hr' ? 'role-hr' : 'role-both';

  var detailHtml =
    '<div class="detail">' +
      '<div class="detail-header">' +
        '<div class="detail-num">' + step.num + '</div>' +
        '<div class="detail-title">' + step.title + '</div>' +
        '<div class="detail-badge ' + badgeClass + '">' + step.roleLabel + '</div>' +
      '</div>' +
      '<div class="detail-text">' + step.text + '</div>' +
      '<div class="detail-spacer"></div>' +
    '</div>';

  var coverageHtml =
    '<div class="coverage">' +
      '<div class="coverage-dot"></div>' +
      '<div class="coverage-text"><strong>This course covers Steps 2\u20136</strong> \u2014 from submitting your HRDESK request to closing the role in Lever. Click each step above to explore.</div>' +
    '</div>';

  document.getElementById('root').innerHTML =
    '<div class="wrap">' +
      '<div class="header">' +
        '<div class="header-eyebrow">Your journey</div>' +
        '<div class="header-title">From Finalist to First Day</div>' +
        '<div class="header-sub">Click any step to see what happens and who\u2019s responsible</div>' +
      '</div>' +
      '<div class="steps">' + stepsHtml + '</div>' +
      detailHtml +
      coverageHtml +
    '</div>';

  document.querySelectorAll('.step').forEach(function(el) {
    el.addEventListener('click', function() {
      state.selected = parseInt(el.dataset.idx);
      render();
    });
  });
}

render();
</script>
</body>
</html>
