<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Bai Jamjuree',sans-serif;background:#fff;color:#000;padding:20px 28px;line-height:1.5;max-width:100%;margin:0 auto}

.header{background:linear-gradient(135deg,#80EAFF 0%,#50D0ED 100%);border-radius:10px;padding:14px 20px 12px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.header-text{flex:1}
.header-eyebrow{font-size:.7rem;font-weight:600;color:rgba(0,60,80,.5);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px}
.header-title{font-size:22px;font-weight:700;color:#0A3D4F;line-height:1.2}

.progress-ring{position:relative;width:50px;height:50px;flex-shrink:0}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:3.5}
.progress-ring .track{stroke:rgba(0,60,80,.1)}
.progress-ring .fill{stroke:#0A3D4F;stroke-linecap:round;transition:stroke-dashoffset .3s ease,stroke .3s ease}
.progress-ring .fill.done{stroke:#10B981}
.progress-count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0A3D4F}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}

.card{background:#fff;border:1px solid #ecedea;border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .12s;user-select:none;-webkit-user-select:none;display:flex;gap:10px;align-items:center}
.card:hover{background:#fafaf9;border-color:#ddd}
.card.checked{background:#f0fbff;border-color:#80EAFF}
.card.checked:hover{background:#e0f7ff}
.card.done{background:#ecfdf5;border-color:#a7f3d0;cursor:default}
.card.full-width{grid-column:1/-1}

.cb{width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cb.active{border:none;background:#2ABFDB}
.cb.complete{border:none;background:#10B981}
.cb svg{display:none}
.cb.active svg,.cb.complete svg{display:block}

.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:5px}
.card-label{font-size:18px;font-weight:600;color:#000;line-height:1.3}
.done .card-label{text-decoration:line-through;text-decoration-color:#a7f3d0;color:#065F46}
.badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#aaa;flex-shrink:0;margin-left:auto}
.badge.ok{color:#10B981}
.card-hint{font-size:14px;color:#999;line-height:1.3}

.footer-hint{font-size:14px;color:#999;text-align:center;margin-bottom:6px}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:18px;font-weight:700;font-family:inherit;letter-spacing:.2px;transition:all .2s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#80EAFF 0%,#2ABFDB 100%);color:#0A3D4F}
.btn-disabled{background:#f4f4f3;color:#aaa;cursor:not-allowed}

.success{background:linear-gradient(135deg,#059669 0%,#10B981 100%);border-radius:8px;padding:14px 18px;text-align:center}
.success-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.success-desc{font-size:14px;color:rgba(255,255,255,.8);line-height:1.4;margin-bottom:10px}
.btn-reset{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:7px 18px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="root"></div>

<script>
var ITEMS=[
  {id:"name",label:"Candidate's full legal name",hint:"Spelled correctly \u2014 goes on legal docs",required:true},
  {id:"contact",label:"Contact information",hint:"Email and phone number",required:true},
  {id:"salary",label:"Salary range & offer amount",hint:"Amount and type (annual, hourly)",required:true},
  {id:"title",label:"Correct job title",hint:"Must match approved requisition",required:true},
  {id:"start",label:"Proposed start date",hint:"Confirmed with the candidate and HR",required:true},
  {id:"type",label:"Employment type",hint:"RFT or Consultant",required:true},
  {id:"zip",label:"ZIP ticket number",hint:"Approved by Finance",required:true},
  {id:"equipment",label:"Equipment needs",hint:"Laptop or other hardware?",required:true},
  {id:"special",label:"Special circumstances",hint:"Relocation, sign-on bonus, visa, etc.",required:false,full:true}
];

var state={checked:{},submitted:false};
var CIRC=2*Math.PI*20;

function render(){
  var checked=state.checked;
  var submitted=state.submitted;
  var req=ITEMS.filter(function(i){return i.required});
  var reqDone=req.every(function(i){return checked[i.id]});
  var total=Object.values(checked).filter(Boolean).length;
  var pct=total/ITEMS.length;
  var offset=CIRC*(1-pct);
  var reqCount=req.filter(function(i){return checked[i.id]}).length;

  var chk='<svg width="11" height="8" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var cards=ITEMS.map(function(item){
    var on=!!checked[item.id];
    var cls=submitted&&on?'card done':on?'card checked':'card';
    var fw=item.full?' full-width':'';
    var cbCls=submitted&&on?'cb complete':on?'cb active':'cb';
    var badge='';
    if(item.required){badge=on?'<span class="badge ok">\u2713</span>':'<span class="badge">Req</span>'}
    else{badge='<span class="badge">Optional</span>'}
    return '<div class="'+cls+fw+'" data-id="'+item.id+'">'+
      '<div class="'+cbCls+'">'+chk+'</div>'+
      '<div class="card-body">'+
        '<div class="card-top">'+
          '<span class="card-label">'+item.label+'</span>'+
          badge+
        '</div>'+
        '<div class="card-hint">'+item.hint+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  var fillCls=submitted?'fill done':'fill';

  var footer='';
  if(submitted){
    footer='<div class="success">'+
      '<div class="success-title">\u2713 Ready to submit your HRDESK ticket</div>'+
      '<div class="success-desc">Double-check spelling and numbers before you hit send.</div>'+
      '<button class="btn-reset" id="resetBtn">Start over</button>'+
    '</div>';
  }else{
    var bc=reqDone?'btn btn-primary':'btn btn-disabled';
    var bt=reqDone?'All set \u2014 ready to submit \u2713':reqCount+' of '+req.length+' required items';
    var hint=reqDone?'':'<div class="footer-hint">Complete all required items to continue</div>';
    footer=hint+'<button class="'+bc+'" id="submitBtn"'+(reqDone?'':' disabled')+'>'+bt+'</button>';
  }

  document.getElementById('root').innerHTML=
    '<div class="header">'+
      '<div class="header-text">'+
        '<div class="header-eyebrow">Before you submit</div>'+
        '<div class="header-title">HRDESK Ticket Checklist</div>'+
      '</div>'+
      '<div class="progress-ring">'+
        '<svg width="50" height="50" viewBox="0 0 44 44">'+
          '<circle class="track" cx="22" cy="22" r="20"/>'+
          '<circle class="'+fillCls+'" cx="22" cy="22" r="20" stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+offset+'"/>'+
        '</svg>'+
        '<div class="progress-count">'+total+'/'+ITEMS.length+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="grid">'+cards+'</div>'+
    footer;

  document.querySelectorAll('.card').forEach(function(el){
    el.addEventListener('click',function(){
      if(state.submitted)return;
      var id=el.dataset.id;
      state.checked[id]=!state.checked[id];
      render();
    });
  });
  var sb=document.getElementById('submitBtn');
  if(sb)sb.addEventListener('click',function(){if(reqDone){state.submitted=true;render()}});
  var rb=document.getElementById('resetBtn');
  if(rb)rb.addEventListener('click',function(){state.checked={};state.submitted=false;render()});
}

render();
</script>
</body>
</html>
