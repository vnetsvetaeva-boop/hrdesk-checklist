<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRDESK Ticket Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: #1F2937;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #80EAFF 0%, #50D0ED 100%);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-eyebrow {
      font-size: 9px; font-weight: 600;
      color: rgba(0,60,80,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .header-title {
      font-size: 15px; font-weight: 700;
      color: #0A3D4F; line-height: 1.2;
    }
    .progress-ring {
      position: relative;
      width: 44px; height: 44px;
      flex-shrink: 0;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 3.5; }
    .progress-ring .track { stroke: rgba(0,60,80,0.1); }
    .progress-ring .fill {
      stroke: #0A3D4F;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
    }
    .progress-ring .fill.done { stroke: #10B981; }
    .progress-count {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #0A3D4F;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 6px 6px 4px;
      flex: 1;
      align-content: start;
    }

    .card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.12s ease;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .card:hover { background: #F9FAFB; border-color: #D1D5DB; }
    .card.checked { background: #F0FBFF; border-color: #80EAFF; }
    .card.checked:hover { background: #E0F7FF; }
    .card.done { background: #ECFDF5; border-color: #A7F3D0; cursor: default; }
    .card.full-width { grid-column: 1 / -1; }

    .cb {
      width: 18px; height: 18px; min-width: 18px;
      border-radius: 4px;
      border: 2px solid #D1D5DB;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .cb.active { border: none; background: #2ABFDB; }
    .cb.complete { border: none; background: #10B981; }
    .cb svg { display: none; }
    .cb.active svg, .cb.complete svg { display: block; }

    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 4px; }
    .card-label {
      font-size: 12px; font-weight: 600;
      color: #1F2937; line-height: 1.3;
    }
    .done .card-label {
      text-decoration: line-through;
      text-decoration-color: #A7F3D0;
      color: #065F46;
    }
    .badge {
      font-size: 8px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #B0B6BF;
      flex-shrink: 0;
      margin-left: auto;
    }
    .badge.ok { color: #10B981; }
    .card-hint {
      font-size: 10.5px; color: #9CA3AF;
      line-height: 1.3;
    }

    .footer {
      padding: 4px 6px 6px;
      flex-shrink: 0;
    }
    .footer-hint {
      font-size: 10.5px; color: #9CA3AF;
      text-align: center;
      margin-bottom: 4px;
    }
    .btn {
      width: 100%; padding: 10px;
      border-radius: 8px; border: none;
      font-size: 12.5px; font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #80EAFF 0%, #2ABFDB 100%);
      color: #0A3D4F;
    }
    .btn-disabled {
      background: #E5E7EB; color: #9CA3AF;
      cursor: not-allowed;
    }

    .success {
      background: linear-gradient(135deg, #059669 0%, #10B981 100%);
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
    }
    .success-title {
      font-size: 13px; font-weight: 700;
      color: #fff; margin-bottom: 2px;
    }
    .success-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      line-height: 1.3; margin-bottom: 8px;
    }
    .btn-reset {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 6px 16px;
      color: #fff;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
var ITEMS = [
  { id: "name", label: "Candidate's full legal name", hint: "Spelled correctly — goes on legal docs", required: true },
  { id: "contact", label: "Contact information", hint: "Email and phone number", required: true },
  { id: "salary", label: "Salary range & offer amount", hint: "Amount and type (annual, hourly)", required: true },
  { id: "title", label: "Correct job title", hint: "Must match approved requisition", required: true },
  { id: "start", label: "Proposed start date", hint: "Confirmed with the candidate and HR", required: true },
  { id: "type", label: "Employment type", hint: "RFT or Consultant", required: true },
  { id: "zip", label: "ZIP ticket number", hint: "Approved by Finance", required: true },
  { id: "equipment", label: "Equipment needs", hint: "Laptop or other hardware?", required: true },
  { id: "special", label: "Special circumstances", hint: "Relocation, sign-on bonus, visa, etc.", required: false, full: true }
];

var state = { checked: {}, submitted: false };
var CIRC = 2 * Math.PI * 18;

function render() {
  var checked = state.checked;
  var submitted = state.submitted;
  var req = ITEMS.filter(function(i) { return i.required; });
  var reqDone = req.every(function(i) { return checked[i.id]; });
  var total = Object.values(checked).filter(Boolean).length;
  var pct = total / ITEMS.length;
  var offset = CIRC * (1 - pct);
  var reqCount = req.filter(function(i) { return checked[i.id]; }).length;

  var chk = '<svg width="10" height="8" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var cards = ITEMS.map(function(item) {
    var on = !!checked[item.id];
    var cls = submitted && on ? 'card done' : on ? 'card checked' : 'card';
    var fw = item.full ? ' full-width' : '';
    var cbCls = submitted && on ? 'cb complete' : on ? 'cb active' : 'cb';
    var badge = '';
    if (item.required) {
      badge = on ? '<span class="badge ok">\u2713</span>' : '<span class="badge">Req</span>';
    } else {
      badge = '<span class="badge">Optional</span>';
    }
    return '<div class="' + cls + fw + '" data-id="' + item.id + '">' +
      '<div class="' + cbCls + '">' + chk + '</div>' +
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<span class="card-label">' + item.label + '</span>' +
          badge +
        '</div>' +
        '<div class="card-hint">' + item.hint + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var fillCls = submitted ? 'fill done' : 'fill';

  var footer = '';
  if (submitted) {
    footer = '<div class="success">' +
      '<div class="success-title">\u2713 Ready to submit your HRDESK ticket</div>' +
      '<div class="success-desc">Double-check spelling and numbers before you hit send.</div>' +
      '<button class="btn-reset" id="resetBtn">Start over</button>' +
    '</div>';
  } else {
    var bc = reqDone ? 'btn btn-primary' : 'btn btn-disabled';
    var bt = reqDone ? 'All set \u2014 ready to submit \u2713' : reqCount + ' of ' + req.length + ' required items';
    var hint = reqDone ? '' : '<div class="footer-hint">Complete all required items to continue</div>';
    footer = hint + '<button class="' + bc + '" id="submitBtn"' + (reqDone ? '' : ' disabled') + '>' + bt + '</button>';
  }

  document.getElementById('root').innerHTML =
    '<div class="header">' +
      '<div class="header-text">' +
        '<div class="header-eyebrow">Before you submit</div>' +
        '<div class="header-title">HRDESK Ticket Checklist</div>' +
      '</div>' +
      '<div class="progress-ring">' +
        '<svg width="44" height="44" viewBox="0 0 40 40">' +
          '<circle class="track" cx="20" cy="20" r="18"/>' +
          '<circle class="' + fillCls + '" cx="20" cy="20" r="18" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + offset + '"/>' +
        '</svg>' +
        '<div class="progress-count">' + total + '/' + ITEMS.length + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="grid">' + cards + '</div>' +
    '<div class="footer">' + footer + '</div>';

  document.querySelectorAll('.card').forEach(function(el) {
    el.addEventListener('click', function() {
      if (state.submitted) return;
      var id = el.dataset.id;
      state.checked[id] = !state.checked[id];
      render();
    });
  });
  var sb = document.getElementById('submitBtn');
  if (sb) sb.addEventListener('click', function() { if (reqDone) { state.submitted = true; render(); } });
  var rb = document.getElementById('resetBtn');
  if (rb) rb.addEventListener('click', function() { state.checked = {}; state.submitted = false; render(); });
}

render();
</script>
</body>
</html>
