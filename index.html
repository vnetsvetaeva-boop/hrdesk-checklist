<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRDESK Ticket Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: #FAFAFA;
      color: #1F2937;
      -webkit-font-smoothing: antialiased;
    }
    #root { max-width: 620px; margin: 0 auto; padding: 16px 14px; }

    .header {
      background: linear-gradient(135deg, #80EAFF 0%, #50D0ED 100%);
      border-radius: 12px;
      padding: 16px 18px 14px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header::after {
      content: '';
      position: absolute;
      top: -30px; right: -20px;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(0,60,80,0.05);
    }
    .header-text { flex: 1; }
    .header-eyebrow {
      font-size: 10px; font-weight: 600;
      color: rgba(0,60,80,0.55);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      margin-bottom: 3px;
    }
    .header-title {
      font-size: 16px; font-weight: 700;
      color: #0A3D4F; line-height: 1.3;
    }
    .progress-ring {
      position: relative;
      width: 52px; height: 52px;
      flex-shrink: 0;
      z-index: 1;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle {
      fill: none; stroke-width: 4;
    }
    .progress-ring .track { stroke: rgba(0,60,80,0.12); }
    .progress-ring .fill {
      stroke: #0A3D4F;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.35s ease, stroke 0.3s ease;
    }
    .progress-ring .fill.done { stroke: #34D399; }
    .progress-count {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: #0A3D4F;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .card:hover { background: #F9FAFB; border-color: #D1D5DB; }
    .card.checked { background: #F0FBFF; border-color: #80EAFF; }
    .card.checked:hover { background: #E0F7FF; }
    .card.done { background: #F0FDF4; border-color: #A7F3D0; cursor: default; }
    .card.full-width { grid-column: 1 / -1; }

    .cb {
      width: 20px; height: 20px; min-width: 20px;
      border-radius: 5px;
      border: 2px solid #D1D5DB;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .cb.active { border: none; background: #2ABFDB; }
    .cb.complete { border: none; background: #10B981; }
    .cb svg { display: none; }
    .cb.active svg, .cb.complete svg { display: block; }

    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; align-items: center; gap: 5px; }
    .card-label {
      font-size: 13px; font-weight: 600;
      color: #1F2937; line-height: 1.35;
    }
    .done .card-label {
      text-decoration: line-through;
      text-decoration-color: #A7F3D0;
      color: #065F46;
    }
    .badge {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #9CA3AF;
      flex-shrink: 0;
      margin-left: auto;
    }
    .badge.ok { color: #10B981; }
    .card-hint {
      font-size: 11.5px; color: #9CA3AF;
      margin-top: 1px; line-height: 1.35;
    }

    .footer { margin-top: 12px; }
    .footer-hint {
      font-size: 11.5px; color: #9CA3AF;
      text-align: center;
      margin-bottom: 8px;
    }
    .btn {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      font-size: 13.5px; font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #80EAFF 0%, #2ABFDB 100%);
      color: #0A3D4F;
    }
    .btn-disabled {
      background: #E5E7EB; color: #9CA3AF;
      cursor: not-allowed;
    }

    .success {
      background: linear-gradient(135deg, #059669 0%, #10B981 100%);
      border-radius: 10px;
      padding: 16px 18px;
      text-align: center;
    }
    .success-title {
      font-size: 14px; font-weight: 700;
      color: #fff; margin-bottom: 3px;
    }
    .success-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      line-height: 1.4; margin-bottom: 12px;
    }
    .btn-reset {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px;
      padding: 7px 18px;
      color: #fff;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
const ITEMS = [
  { id: "name", label: "Candidate's full legal name", hint: "Spelled correctly — goes on legal docs", required: true },
  { id: "contact", label: "Contact information", hint: "Email and phone number", required: true },
  { id: "salary", label: "Salary range & offer amount", hint: "Amount and type (annual, hourly)", required: true },
  { id: "title", label: "Correct job title", hint: "Must match approved requisition", required: true },
  { id: "start", label: "Proposed start date", hint: "Confirmed with the candidate and HR", required: true },
  { id: "type", label: "Employment type", hint: "RFT or Consultant", required: true },
  { id: "zip", label: "ZIP ticket number", hint: "Approved by Finance", required: true },
  { id: "equipment", label: "Equipment needs", hint: "Laptop or other hardware?", required: true },
  { id: "special", label: "Special circumstances", hint: "Relocation, sign-on bonus, visa, etc.", required: false, full: true }
];

const state = { checked: {}, submitted: false };
const CIRC = 2 * Math.PI * 22;

function render() {
  const { checked, submitted } = state;
  const req = ITEMS.filter(i => i.required);
  const reqDone = req.every(i => checked[i.id]);
  const total = Object.values(checked).filter(Boolean).length;
  const pct = total / ITEMS.length;
  const offset = CIRC * (1 - pct);
  const reqCount = req.filter(i => checked[i.id]).length;

  const chk = '<svg width="12" height="9" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const cards = ITEMS.map(item => {
    const on = !!checked[item.id];
    const cls = submitted && on ? 'card done' : on ? 'card checked' : 'card';
    const fw = item.full ? ' full-width' : '';
    const cbCls = submitted && on ? 'cb complete' : on ? 'cb active' : 'cb';
    let badge = '';
    if (item.required) {
      badge = on ? '<span class="badge ok">\u2713</span>' : '<span class="badge">Req</span>';
    } else {
      badge = '<span class="badge">Optional</span>';
    }
    return '<div class="' + cls + fw + '" data-id="' + item.id + '">' +
      '<div class="' + cbCls + '">' + chk + '</div>' +
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<span class="card-label">' + item.label + '</span>' +
          badge +
        '</div>' +
        '<div class="card-hint">' + item.hint + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  const fillCls = submitted ? 'fill done' : 'fill';

  let footer = '';
  if (submitted) {
    footer = '<div class="success">' +
      '<div class="success-title">\u2713 You\u2019re ready to submit your HRDESK ticket</div>' +
      '<div class="success-desc">Double-check spelling and numbers before you hit send.</div>' +
      '<button class="btn-reset" id="resetBtn">Start over</button>' +
    '</div>';
  } else {
    const bc = reqDone ? 'btn btn-primary' : 'btn btn-disabled';
    const bt = reqDone ? 'All set \u2014 ready to submit \u2713' : reqCount + ' of ' + req.length + ' required items';
    const hint = reqDone ? '' : '<div class="footer-hint">Complete all required items to continue</div>';
    footer = hint + '<button class="' + bc + '" id="submitBtn"' + (reqDone ? '' : ' disabled') + '>' + bt + '</button>';
  }

  document.getElementById('root').innerHTML =
    '<div class="header">' +
      '<div class="header-text">' +
        '<div class="header-eyebrow">Before you submit</div>' +
        '<div class="header-title">HRDESK Ticket Checklist</div>' +
      '</div>' +
      '<div class="progress-ring">' +
        '<svg width="52" height="52" viewBox="0 0 48 48">' +
          '<circle class="track" cx="24" cy="24" r="22"/>' +
          '<circle class="' + fillCls + '" cx="24" cy="24" r="22" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + offset + '"/>' +
        '</svg>' +
        '<div class="progress-count">' + total + '/' + ITEMS.length + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="grid">' + cards + '</div>' +
    '<div class="footer">' + footer + '</div>';

  document.querySelectorAll('.card').forEach(function(el) {
    el.addEventListener('click', function() {
      if (state.submitted) return;
      var id = el.dataset.id;
      state.checked[id] = !state.checked[id];
      render();
    });
  });
  var sb = document.getElementById('submitBtn');
  if (sb) sb.addEventListener('click', function() { if (reqDone) { state.submitted = true; render(); } });
  var rb = document.getElementById('resetBtn');
  if (rb) rb.addEventListener('click', function() { state.checked = {}; state.submitted = false; render(); });
}

render();
</script>
</body>
</html>
